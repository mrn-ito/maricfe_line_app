<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Mini App</title>
    <!-- LINEの機能を動かすためのSDK -->
    <script src="https://line-scdn.net"></script>
    <script src="https://unpkg.com"></script>
	<script>
	  // vConsoleを初期化
	  var vConsole = new window.VConsole();
	</script>
</head>
<body>
    <h1>こんにちは！</h1>
    <p id="user-name">読み込み中...</p>

    <script>
        async function main() {
            // ここに「LIFF ID」を入れます
            await liff.init({ liffId: "2009861857-bpl07gP4" });

            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('user-name').innerText = profile.displayName + "さん、ようこそ！";
            } else {
                liff.login();
            }
        }
        main();
        
        
    </script>
</body>
</html>
