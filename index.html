<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mini App</title>
    <!-- LINEの機能を動かすためのSDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
    <script src="https://unpkg.com"></script>
</head>
<body>
    <h1>こんにちは！</h1>
    <p id="user-name">読み込み中...</p>

    <script>
        async function main() {
            // ここに「LIFF ID」を入れます
            await liff.init({ liffId: "2009861857-bpl07gP4" })
            .then(() => {
                // start to use LIFF's api
            })
            .catch((err) => {
                console.log(err);
            });

            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('user-name').innerText = profile.displayName + "さん、ようこそ！";
            } else {
                liff.login();
            }
        }
        main();
        
        
    </script>
</body>
</html>
